<template id="home-template">
  <header class="header">
    <div class="logo-content">
      <span>🐾</span>
      <h2>PetCare</h2>
    </div>

    <div class="profile">
      <span id="username-label"></span>
      <button id="logoutBtn" class="outline-button">Cerrar sesión</button>
    </div>
  </header>

  <div id="home-layout">
    <section class="panel pets-panel">
      <div class="section-title">
        <div>
          <p class="eyebrow">MIS COMPAÑEROS</p>
          <h1>Mascotas</h1>
        </div>

        <button id="new-pet-btn" class="solid-primary-button">+ Nueva mascota</button>
      </div>

      <form id="pet-form" class="card form-grid hidden">
        <label class="default-field">
          Nombre
          <input id="pet-name" required maxlength="100">
        </label>

        <label class="default-field">
          Especie
          <input id="pet-species" required maxlength="50">
        </label>

        <label class="default-field">
          Raza
          <input id="pet-breed" maxlength="50">
        </label>

        <label class="default-field">
          Fecha de nacimiento
          <input id="pet-birth-date" type="date" required>
        </label>

        <div class="form-actions">
          <button type="button" id="cancel-pet-btn" class="outline-button">Cancelar</button>
          <button type="submit" class="solid-primary-button">Guardar</button>
        </div>
      </form>

      <p id="home-message" class="message hidden" role="status"></p>
      <div id="pets-list" class="pet-grid"></div>
    </section>

    <section class="panel records-panel">
      <div class="section-title">
        <div>
          <p class="eyebrow">EXPEDIENTE</p>
          <h2 id="records-title">Selecciona una mascota</h2>
        </div>

        <button id="new-record-btn" class="solid-primary-button hidden">+ Nuevo registro</button>
      </div>

      <form id="record-form" class="card form-grid hidden">
        <label class="default-field">
          Tipo
          <select id="record-type" required>
            <option value="vaccination">Vacunación</option>
            <option value="checkup">Consulta</option>
            <option value="surgery">Cirugía</option>
            <option value="deworming">Desparasitación</option>
            <option value="sterilization">Esterilización</option>
            <option value="other">Otro</option>
          </select>
        </label>

        <label class="default-field full">
          Descripción
          <textarea id="record-description" rows="3" required></textarea>
        </label>

        <label class="default-field">
          Próximo refuerzo
          <input id="record-booster" type="datetime-local">
        </label>

        <div class="form-actions">
          <button type="button" id="cancel-record-btn" class="outline-button">Cancelar</button>
          <button type="submit" class="solid-primary-button">Guardar</button>
        </div>
      </form>

      <div id="records-list" class="records-list">
        <div class="empty-state">
          🐕
          <p>Selecciona una mascota para consultar su historial.</p>
        </div>
      </div>
    </section>
  </div>
</template>
